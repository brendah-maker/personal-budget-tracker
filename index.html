<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Personal Budget Tracker</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    background: linear-gradient(135deg, #6a0dad, #b57edc);
    min-height: 100vh;
    padding: 30px 15px;
    color: #333;
}

.container {
    max-width: 1000px;
    margin: auto;
}

h1 {
    text-align: center;
    color: white;
    margin-bottom: 30px;
    font-size: 32px;
}

.card {
    background: rgba(255, 255, 255, 0.95);
    padding: 25px;
    margin-bottom: 25px;
    border-radius: 15px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    transition: transform 0.2s ease;
}

.card:hover {
    transform: translateY(-3px);
}

.balance {
    font-size: 36px;
    font-weight: bold;
    margin-top: 10px;
}

.green { color: #2ecc71; }
.orange { color: #f39c12; }
.red { color: #e74c3c; }

.progress-bar {
    height: 18px;
    background: #eee;
    border-radius: 50px;
    overflow: hidden;
    margin-top: 15px;
}

.progress {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #6a0dad, #b57edc);
    transition: width 0.4s ease;
}

input, select {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 8px;
    border: 1px solid #ddd;
    font-size: 14px;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 15px;
    border-radius: 8px;
    border: none;
    background: #6a0dad;
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s ease;
}

button:hover {
    background: #4b0082;
}

canvas {
    margin-top: 20px;
}

#insights {
    font-size: 15px;
    padding: 15px;
    background: #f3e6ff;
    border-left: 5px solid #6a0dad;
    border-radius: 8px;
}

@media (min-width: 768px) {
    .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 25px;
    }
}
</style>
</head>

<body>

<div class="container">

<h1>💜 Personal Budget Tracker</h1>

<div class="card">
    <h2>Set Total Budget</h2>
    <input type="number" id="totalBudgetInput" placeholder="Enter total budget">
    <button onclick="setBudget()">Save Budget</button>
</div>

<div class="grid">

<div class="card">
    <h2>Remaining Balance</h2>
    <div id="remainingBalance" class="balance">0</div>
    <div class="progress-bar">
        <div id="progress" class="progress"></div>
    </div>
</div>

<div class="card">
    <h2>Add Expense</h2>
    <select id="category">
        <option>Groceries</option>
        <option>Transport</option>
        <option>Rent</option>
        <option>Entertainment</option>
        <option>Bills</option>
        <option>Other</option>
    </select>
    <input type="number" id="expenseAmount" placeholder="Enter amount">
    <button onclick="addExpense()">Add Expense</button>
</div>

</div>

<div class="card">
    <h2>Spending Overview</h2>
    <canvas id="pieChart"></canvas>
</div>

<div class="card">
    <h2>Insights</h2>
    <div id="insights"></div>
</div>

</div>

<script>
let totalBudget = localStorage.getItem("totalBudget") ? parseFloat(localStorage.getItem("totalBudget")) : 0;
let expenses = localStorage.getItem("expenses") ? JSON.parse(localStorage.getItem("expenses")) : [];

const pieCtx = document.getElementById('pieChart').getContext('2d');
let pieChart;

function setBudget() {
    const input = document.getElementById("totalBudgetInput").value;
    if (input) {
        totalBudget = parseFloat(input);
        localStorage.setItem("totalBudget", totalBudget);
        updateUI();
    }
}

function addExpense() {
    const category = document.getElementById("category").value;
    const amount = parseFloat(document.getElementById("expenseAmount").value);

    if (!amount || amount <= 0) return;

    expenses.push({ category, amount });
    localStorage.setItem("expenses", JSON.stringify(expenses));

    document.getElementById("expenseAmount").value = "";
    updateUI();
}

function calculateTotalExpenses() {
    return expenses.reduce((sum, item) => sum + item.amount, 0);
}

function updateUI() {
    const totalExpenses = calculateTotalExpenses();
    const remaining = totalBudget - totalExpenses;
    const remainingEl = document.getElementById("remainingBalance");
    const progress = document.getElementById("progress");

    remainingEl.textContent = "KES " + remaining.toFixed(2);

    let percentUsed = totalBudget ? (totalExpenses / totalBudget) * 100 : 0;
    progress.style.width = percentUsed + "%";

    if (remaining > totalBudget * 0.5) {
        remainingEl.className = "balance green";
    } else if (remaining > totalBudget * 0.2) {
        remainingEl.className = "balance orange";
    } else {
        remainingEl.className = "balance red";
    }

    updateChart();
    updateInsights(remaining, totalExpenses);
}

function updateChart() {
    const categoryTotals = {};
    expenses.forEach(item => {
        categoryTotals[item.category] = (categoryTotals[item.category] || 0) + item.amount;
    });

    const labels = Object.keys(categoryTotals);
    const data = Object.values(categoryTotals);

    if (pieChart) pieChart.destroy();

    pieChart = new Chart(pieCtx, {
        type: 'pie',
        data: {
            labels: labels,
            datasets: [{
                data: data
            }]
        }
    });
}

function updateInsights(remaining) {
    const insights = document.getElementById("insights");

    if (remaining > 0) {
        insights.innerHTML = `Great job! You still have <b>KES ${remaining.toFixed(2)}</b> remaining. Consider saving or investing it.`;
    } else if (remaining < 0) {
        insights.innerHTML = `Warning! You overspent by <b>KES ${Math.abs(remaining).toFixed(2)}</b>. Review your spending categories.`;
    } else {
        insights.innerHTML = "Perfect balance! You used your full budget wisely.";
    }
}

updateUI();
</script>

</body>
</html>
